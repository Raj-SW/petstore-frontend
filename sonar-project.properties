sonar.projectKey=Raj-SW_petstore-frontend
sonar.organization=raj-sw
sonar.sources=src
# Exclude test files + the tests/ tree from issue analysis so test boilerplate
# (esp. the repetitive API-wrapper specs) doesn't count toward the
# Maintainability Rating on New Code. Coverage still maps to src/ via lcov.
# Mirrors the backend's Sonar setup (which does not declare sonar.tests).
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.test.js,**/*.test.jsx,tests/**
sonar.coverage.exclusions=**/*.test.js,**/*.test.jsx,tests/**,**/*.config.js,scripts/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# S6774: prop-types validation — project uses neither PropTypes nor TypeScript by design;
# every component would trigger this rule. Suppressed project-wide.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S6774
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.jsx
